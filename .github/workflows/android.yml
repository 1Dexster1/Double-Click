name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Decimal / Base64 Decode Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          base64 -d debug.keystore.base64 > debug.keystore
          echo "Debug keystore decoded successfully."
        else
          echo "debug.keystore.base64 not found!"
          exit 1
        fi

    - name: Generate or Make Gradle Wrapper Executable
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "gradlew not found, generating wrapper..."
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: EchoClick-APK
        path: app/build/outputs/apk/debug/app-debug.apk
