name: Build Android APK

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: gradle

    - name: Set up Debug Keystore
      run: |
        if [ -f debug.keystore.base64 ]; then
          echo "Decoding debug.keystore.base64..."
          base64 -d debug.keystore.base64 > debug.keystore
        elif [ -f debug.keystore ]; then
          echo "debug.keystore already exists."
        else
          echo "debug.keystore not found, generating a brand new one using keytool..."
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"
        fi

    - name: Generate or Make Gradle Wrapper Executable
      run: |
        if [ -f gradlew ]; then
          chmod +x gradlew
        else
          echo "gradlew not found, generating wrapper..."
          gradle wrapper
          chmod +x gradlew
        fi

    - name: Build with Gradle
      run: ./gradlew assembleDebug

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: EchoClick-APK
        path: app/build/outputs/apk/debug/app-debug.apk
